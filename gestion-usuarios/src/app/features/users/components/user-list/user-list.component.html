<div class="container">
  <header class="mb-3">
    <h1>Gestión de Usuarios</h1>
    <div class="actions">
      <select (change)="onTipoChange($event)" class="form-control">
        <option value="">Todos los usuarios</option>
        <option value="DEMANDANTE">Demandantes</option>
        <option value="EMPLEADO">Empleados</option>
      </select>
      <button (click)="onNuevoUsuario()" class="btn btn-primary">
        Nuevo Usuario
      </button>
    </div>
  </header>

  <div class="card">
    <div class="card-body">
      <table *ngIf="usuarios$ | async as usuarios" class="table">
        <thead>
          <tr>
            <th>NIF</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Tipo</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let usuario of usuarios">
            <td>{{usuario.nif}}</td>
            <td>{{usuario.nombre}}</td>
            <td>{{usuario.primerApellido}} {{usuario.segundoApellido}}</td>
            <td>{{usuario.tipo}}</td>
            <td class="actions">
              <button mat-icon-button color="primary" (click)='onVerUsuario(usuario)' matTooltip="Ver detalle">
                <mat-icon>visibility</mat-icon>
              </button>
              <button mat-icon-button color="accent" (click)='onEditarUsuario(usuario)' matTooltip="Editar usuario">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)='onEliminarUsuario(usuario)' matTooltip="Eliminar usuario">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </tr>
          <tr *ngIf="usuarios.length === 0">
            <td colspan="5" class="text-center">No hay usuarios registrados</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
